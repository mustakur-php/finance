{% extends 'base.html' %}
{% block title %}تعديل — {{ client.name }}{% endblock %}
{% block page_title %}تعديل بيانات العميل — {{ client.name }}{% endblock %}

{% block content %}
<div class="card" style="max-width:700px;margin:auto;">
    <div class="card-header d-flex justify-content-between align-items-center">
        <span><i class="bi bi-pencil-square me-1"></i> تعديل البيانات</span>
        <a href="{% url 'zatca_detail' client.pk %}" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-arrow-right me-1"></i> رجوع
        </a>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold">الاسم <span class="text-danger">*</span></label>
                    <input type="text" name="name" class="form-control" value="{{ client.name }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">الشركة</label>
                    <input type="text" name="company" class="form-control" value="{{ client.company }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">الجوال</label>
                    <input type="text" name="phone" class="form-control" value="{{ client.phone }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">البريد الإلكتروني</label>
                    <input type="email" name="email" class="form-control" value="{{ client.email }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">المدينة</label>
                    <input type="text" name="city" class="form-control" value="{{ client.city }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">الحي</label>
                    <input type="text" name="district" class="form-control" value="{{ client.district }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">المسؤول</label>
                    <input type="text" name="responsible_person" class="form-control" value="{{ client.responsible_person }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">المسمى الوظيفي</label>
                    <input type="text" name="job_title" class="form-control" value="{{ client.job_title }}">
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">العنوان</label>
                    <input type="text" name="address" class="form-control" value="{{ client.address }}">
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold">ملاحظات</label>
                    <textarea name="notes" class="form-control" rows="3">{{ client.notes }}</textarea>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">الرقم المميز</label>
                    <input type="text" name="distinguished_number" class="form-control" value="{{ client.distinguished_number }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-semibold">الرقم السري</label>
                    <input type="text" name="secret_number" class="form-control" value="{{ client.secret_number }}">
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save me-1"></i> حفظ التغييرات
                    </button>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
