{% extends 'base.html' %}
{% block title %}{{ title }}{% endblock %}
{% block page_title %}{{ title }}{% endblock %}

{% block content %}
<div class="card" style="max-width: 700px;">
    <div class="card-header"><i class="bi bi-geo-alt me-1"></i> {{ title }}</div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row g-3">
                <div class="col-md-12">
                    <label class="form-label">العميل *</label>
                    {{ form.client }}
                </div>
                <div class="col-md-6">
                    <label class="form-label">تاريخ الزيارة *</label>
                    {{ form.visit_date }}
                </div>
                <div class="col-md-6">
                    <label class="form-label">الحالة</label>
                    {{ form.status }}
                </div>
                <div class="col-md-12">
                    <label class="form-label">الغرض من الزيارة</label>
                    {{ form.purpose }}
                </div>
                <div class="col-md-12">
                    <label class="form-label">ملاحظات</label>
                    {{ form.notes }}
                </div>
                <div class="col-md-12">
                    <label class="form-label">نتيجة الزيارة</label>
                    {{ form.result }}
                </div>
            </div>
            <div class="mt-4 d-flex gap-2">
                <button type="submit" class="btn btn-primary px-4">حفظ</button>
                <a href="{% url 'visits_list' %}" class="btn btn-outline-secondary">إلغاء</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
