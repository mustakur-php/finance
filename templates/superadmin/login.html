<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سوبر أدمن — تسجيل الدخول</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { background: #0f1923; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.login-card { background: #1a2a3a; border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
.brand { color: #4fc3f7; font-size: 1.4rem; font-weight: 700; text-align: center; margin-bottom: 0.25rem; }
.brand-sub { color: #607d8b; font-size: 0.8rem; text-align: center; margin-bottom: 2rem; }
.form-control { background: #0f1923; border: 1px solid #2d4a5a; color: #e0e0e0; }
.form-control:focus { background: #0f1923; border-color: #4fc3f7; color: #e0e0e0; box-shadow: 0 0 0 0.2rem rgba(79,195,247,0.15); }
.form-label { color: #90a4ae; font-size: 0.85rem; }
.btn-login { background: #4fc3f7; border: none; color: #0f1923; font-weight: 700; padding: 0.75rem; }
.btn-login:hover { background: #81d4fa; color: #0f1923; }
</style>
</head>
<body>
<div class="login-card">
    <div class="brand">⚙ لوحة التحكم الرئيسية</div>
    <div class="brand-sub">Super Admin Panel</div>
    {% if messages %}{% for m in messages %}
    <div class="alert alert-danger py-2 small">{{ m }}</div>
    {% endfor %}{% endif %}
    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label">اسم المستخدم</label>
            <input type="text" name="username" class="form-control" autofocus required>
        </div>
        <div class="mb-4">
            <label class="form-label">كلمة المرور</label>
            <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-login w-100">دخول</button>
    </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
